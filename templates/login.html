{% extends 'base.html' %}
{% load static %}

{% block title %}Login | Studor PathCredit Logger{% endblock %}

{% block content %}
<section class="auth-card">
    <h1>Welcome back</h1>
    <p class="subtext">Login to manage your activity logs.</p>

    <form id="login-form" class="form-stack" novalidate>
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />

        <button type="submit" class="btn primary">Login</button>
    </form>

    <p id="message" class="message" role="status" aria-live="polite"></p>
    <p class="switch-link">New user? <a href="/register/">Create account</a></p>
</section>

<script src="{% static 'js/login.js' %}"></script>
{% endblock %}
